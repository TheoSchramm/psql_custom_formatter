name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run regression test
        run: |
          cat tests/fixtures/input.sql | python3 psql_custom_formatter.py | diff - tests/fixtures/expected.sql

      - name: Run full test suite
        run: python3 tests/run_tests.py

      - name: Verify --check mode on formatted file
        run: |
          python3 psql_custom_formatter.py --check tests/fixtures/expected.sql

      - name: Verify --check mode detects unformatted file
        run: |
          python3 psql_custom_formatter.py --check tests/fixtures/input.sql && exit 1 || test $? -eq 1
